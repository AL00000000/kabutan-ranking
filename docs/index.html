<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>売買代金ランキング | 東証 上位200銘柄</title>
<style>
:root {
  --bg: #0a0f1c;
  --panel: #101830;
  --panel2: #0d1426;
  --border: #1e2a48;
  --text: #dbe4f5;
  --muted: #7787a5;
  --accent: #39c5cf;
  --up: #ff5b6a;
  --down: #4da3ff;
  --new: #ffd166;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
  min-height: 100vh;
}
.wrap { max-width: 1240px; margin: 0 auto; padding: 24px 16px 64px; }
header.site {
  display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px 20px;
  padding: 8px 4px 20px;
}
header.site h1 { font-size: 1.45rem; font-weight: 700; letter-spacing: .02em; }
header.site h1 .dot { color: var(--accent); }
header.site .sub { color: var(--muted); font-size: .85rem; }
.toolbar {
  display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px; margin-bottom: 14px;
}
.toolbar label { color: var(--muted); font-size: .82rem; margin-right: 6px; }
.toolbar select, .toolbar input {
  background: var(--panel2); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 12px; font-size: .9rem; outline: none;
}
.toolbar select:focus, .toolbar input:focus { border-color: var(--accent); }
.toolbar input { width: 220px; }
.toolbar .spacer { flex: 1; }
.stat { color: var(--muted); font-size: .82rem; }
.stat b { color: var(--text); font-weight: 600; }
.hint { color: var(--muted); font-size: .78rem; padding: 0 4px 10px; }
.tablecard {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; overflow: auto; max-height: 78vh;
}
table { border-collapse: collapse; width: 100%; font-size: .855rem; white-space: nowrap; }
thead th {
  position: sticky; top: 0; z-index: 2;
  background: #16223f; color: var(--muted);
  font-weight: 600; font-size: .78rem;
  padding: 10px 10px; text-align: right;
  border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none;
}
thead th:hover { color: var(--accent); }
thead th.tl { text-align: left; }
thead th .arw { color: var(--accent); margin-left: 3px; }
tbody td {
  padding: 7px 10px; text-align: right;
  border-bottom: 1px solid #141d36;
  font-variant-numeric: tabular-nums;
}
tbody td.tl { text-align: left; }
tbody tr:hover { background: #16223f66; }
td.up { color: var(--up); }
td.down { color: var(--down); }
td.flat { color: var(--muted); }
td.new { color: var(--new); font-weight: 700; }
td.code a { color: var(--accent); text-decoration: none; }
td.code a:hover { text-decoration: underline; }
td.name { max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
.value-cell { font-weight: 600; }
footer {
  margin-top: 18px; color: var(--muted); font-size: .76rem; line-height: 1.7;
  padding: 0 4px;
}
footer a { color: var(--accent); }
.loading { padding: 48px; text-align: center; color: var(--muted); }
@media (max-width: 720px) {
  .toolbar input { width: 100%; }
}
</style>
</head>
<body>
<div class="wrap">
  <header class="site">
    <h1>売買代金ランキング<span class="dot">.</span></h1>
    <span class="sub">東証 上位200銘柄 / 平日更新 / 前営業日比の順位・売買代金変動付き</span>
  </header>

  <div class="toolbar">
    <span><label>日付</label><select id="dateSel"></select></span>
    <span><label>市場</label><select id="marketSel"><option value="">すべて</option></select></span>
    <input id="q" type="search" placeholder="銘柄名・コードで絞り込み">
    <span class="spacer"></span>
    <span class="stat" id="stat"></span>
  </div>
  <div class="hint">列見出しをクリックで並び替え(もう一度クリックで昇順/降順切替)。「変動」= 前営業日からの順位変動、「代金変動%」= 売買代金の前営業日比。</div>

  <div class="tablecard">
    <table id="tbl">
      <thead><tr id="headRow"></tr></thead>
      <tbody id="body"><tr><td class="loading" colspan="15">読み込み中…</td></tr></tbody>
    </table>
  </div>

  <footer>
    データ取得元: <a href="https://kabutan.jp/warning/trading_value_ranking" target="_blank" rel="noopener">株探(kabutan.jp)</a> / 売買代金の単位: 百万円 / 市場休場日は更新されません。<br>
    本サイトのデータの正確性は保証されません。投資判断はご自身の責任で行ってください。
  </footer>
</div>

<script>
"use strict";
const COLS = [
  { key: "rank",               label: "順位",        num: s => s.rank },
  { key: "move",               label: "変動",        num: s => s.is_new ? Infinity : (s.move_num ?? -Infinity) },
  { key: "prev_rank",          label: "前日順位",    num: s => s.prev_rank === "" ? Infinity : +s.prev_rank },
  { key: "code",               label: "コード",      num: null, left: true },
  { key: "name",               label: "銘柄名",      num: null, left: true },
  { key: "market",             label: "市場",        num: null, left: true },
  { key: "price",              label: "株価",        num: s => pnum(s.price) },
  { key: "change",             label: "前日比",      num: s => pnum(s.change) },
  { key: "change_pct",         label: "前日比%",     num: s => pnum(s.change_pct) },
  { key: "value",              label: "売買代金",    num: s => pnum(s.value) },
  { key: "value_move",         label: "代金前日比",  num: s => s.value_move === "" ? -Infinity : pnum(s.value_move) },
  { key: "value_move_pct",     label: "代金変動%",   num: s => s.value_move_pct_num ?? -Infinity },
  { key: "per",                label: "PER",         num: s => pnum2(s.per) },
  { key: "pbr",                label: "PBR",         num: s => pnum2(s.pbr) },
  { key: "yld",                label: "利回り",      num: s => pnum2(s.yld) },
];
let all = [];          // current day's stocks
let sortKey = "rank";
let sortAsc = true;

function pnum(v) {
  if (v == null || v === "" || v === "－") return -Infinity;
  const n = parseFloat(String(v).replace(/,/g, "").replace("+", ""));
  return isNaN(n) ? -Infinity : n;
}
function pnum2(v) { // PER等: 「－」は最後に回す
  if (v == null || v === "" || v === "－") return Infinity;
  const n = parseFloat(String(v).replace(/,/g, ""));
  return isNaN(n) ? Infinity : n;
}
function cls(v) {
  const s = String(v);
  if (s.startsWith("+") || s.startsWith("↑")) return "up";
  if (s.startsWith("-") || s.startsWith("↓")) return "down";
  if (s === "→") return "flat";
  if (s === "NEW") return "new";
  return "";
}

function buildHead() {
  const tr = document.getElementById("headRow");
  tr.innerHTML = "";
  for (const c of COLS) {
    const th = document.createElement("th");
    th.textContent = c.label;
    if (c.left) th.classList.add("tl");
    if (c.key === sortKey) {
      const a = document.createElement("span");
      a.className = "arw";
      a.textContent = sortAsc ? "▲" : "▼";
      th.appendChild(a);
    }
    th.onclick = () => {
      if (sortKey === c.key) { sortAsc = !sortAsc; }
      else {
        sortKey = c.key;
        // 数値列の初回クリックは「大きい順」が自然(順位のみ小さい順)
        sortAsc = c.num ? (c.key === "rank" || c.key === "prev_rank") : true;
      }
      render();
    };
    tr.appendChild(th);
  }
}

function render() {
  buildHead();
  const q = document.getElementById("q").value.trim().toLowerCase();
  const mkt = document.getElementById("marketSel").value;
  let rows = all.filter(s =>
    (!q || s.name.toLowerCase().includes(q) || s.code.toLowerCase().includes(q)) &&
    (!mkt || s.market === mkt));

  const col = COLS.find(c => c.key === sortKey);
  rows.sort((a, b) => {
    let r;
    if (col.num) { r = col.num(a) - col.num(b); }
    else { r = String(a[col.key]).localeCompare(String(b[col.key]), "ja"); }
    if (r === 0) r = a.rank - b.rank;
    return sortAsc ? r : -r;
  });

  const tb = document.getElementById("body");
  tb.innerHTML = "";
  const frag = document.createDocumentFragment();
  for (const s of rows) {
    const tr = document.createElement("tr");
    const cells = [
      [s.rank, ""],
      [s.move, cls(s.move)],
      [s.prev_rank, ""],
      [s.code, "code tl"],
      [s.name, "name tl"],
      [s.market, "tl"],
      [s.price, ""],
      [s.change, cls(s.change)],
      [s.change_pct, cls(s.change_pct)],
      [s.value, "value-cell"],
      [s.value_move, cls(s.value_move)],
      [s.value_move_pct, cls(s.value_move_pct)],
      [s.per, ""],
      [s.pbr, ""],
      [s.yld, ""],
    ];
    for (const [v, c] of cells) {
      const td = document.createElement("td");
      if (c) td.className = c;
      if (c.includes("code")) {
        const a = document.createElement("a");
        a.href = "https://kabutan.jp/stock/?code=" + encodeURIComponent(v);
        a.target = "_blank"; a.rel = "noopener";
        a.textContent = v;
        td.appendChild(a);
      } else {
        td.textContent = v;
      }
      tr.appendChild(td);
    }
    frag.appendChild(tr);
  }
  tb.appendChild(frag);
  document.getElementById("stat").innerHTML =
    "表示 <b>" + rows.length + "</b> / " + all.length + " 銘柄";
}

async function loadDate(d) {
  const res = await fetch("data/" + d + ".json", { cache: "no-cache" });
  const data = await res.json();
  all = data.stocks;
  const mktSel = document.getElementById("marketSel");
  const markets = [...new Set(all.map(s => s.market))];
  mktSel.innerHTML = '<option value="">すべて</option>' +
    markets.map(m => '<option value="' + m + '">' + m + "</option>").join("");
  render();
}

async function init() {
  const res = await fetch("data/index.json", { cache: "no-cache" });
  const idx = await res.json();
  const sel = document.getElementById("dateSel");
  sel.innerHTML = idx.dates.map(d => '<option value="' + d + '">' + d + "</option>").join("");
  sel.onchange = () => loadDate(sel.value);
  document.getElementById("q").oninput = render;
  document.getElementById("marketSel").onchange = render;
  if (idx.dates.length) await loadDate(idx.dates[0]);
  else document.getElementById("body").innerHTML = '<tr><td class="loading" colspan="15">データがありません</td></tr>';
}
init().catch(e => {
  document.getElementById("body").innerHTML =
    '<tr><td class="loading" colspan="15">読み込みエラー: ' + e + "</td></tr>";
});
</script>
</body>
</html>
